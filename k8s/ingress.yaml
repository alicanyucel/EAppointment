apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: eappointment-ingress
  namespace: eappointment
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - api.eappointment.net
    secretName: eappointment-tls
  rules:
  - host: api.eappointment.net
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: eappointment-api-service
            port:
              number: 80
      - path: /metrics
        pathType: Prefix
        backend:
          service:
            name: eappointment-api-service
            port:
              number: 80
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: eappointment-network-policy
  namespace: eappointment
spec:
  podSelector:
    matchLabels:
      app: eappointment-api
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: eappointment
    ports:
    - protocol: TCP
      port: 80
    - protocol: TCP
      port: 443
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          name: eappointment
    ports:
    - protocol: TCP
      port: 1433
    - protocol: TCP
      port: 6379
    - protocol: TCP
      port: 5672
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 53
    - protocol: UDP
      port: 53
