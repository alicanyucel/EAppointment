global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'eappointment-monitor'

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'eappointment-api'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['eappointment-api:80']
    
  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8888']

  - job_name: 'dotnet-metrics'
    static_configs:
      - targets: ['eappointment-api:80']
    metrics_path: '/metrics'
    scrape_interval: 5s
