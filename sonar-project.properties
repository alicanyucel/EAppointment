sonar.projectKey=eappointment
sonar.projectName=EAppointment
sonar.projectVersion=1.0

# Path to source directories
sonar.sources=.
sonar.exclusions=**/bin/**,**/obj/**,**/Migrations/**,**/*.Tests/**,**/wwwroot/**

# Path to test directories
sonar.tests=EAppointment.Tests,EAppointment.IntegrationTests
sonar.test.inclusions=**/*Tests.cs

# Code coverage
sonar.cs.opencover.reportsPaths=**/coverage.opencover.xml
sonar.cs.vstest.reportsPaths=**/*.trx

# Language
sonar.language=cs

# Encoding
sonar.sourceEncoding=UTF-8

# Code analysis rules
sonar.cs.roslyn.ignoreIssues=false

# Duplications
sonar.cpd.exclusions=**/Migrations/**

# SCM
sonar.scm.provider=git
